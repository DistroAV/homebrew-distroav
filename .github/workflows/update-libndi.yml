name: Update libndi cask

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-libndi:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Fetch upstream version and update cask
        id: metadata
        env:
          JSON_URL: https://downloads.ndi.tv/Tools/ndi_tools_win_current_version.json
          PKG_URL: https://downloads.ndi.tv/SDK/NDI_SDK_Mac/libNDI_for_Mac.pkg
        run: |
          set -euo pipefail

          version="$(curl -fsSL "$JSON_URL" | jq -r '.version')"
          sha256="$(curl -fsSL "$PKG_URL" | sha256sum | awk '{print $1}')"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"

          VERSION="$version" SHA256="$sha256" ruby <<'RUBY'
          path = "Casks/libndi.rb"
          content = File.read(path)
          version = ENV.fetch("VERSION")
          sha256 = ENV.fetch("SHA256")

          content.sub!(/^  version .+$/, "  version \"#{version}\"")
          content.sub!(/^  sha256 .+$/, "  sha256 \"#{sha256}\"")

          File.write(path, content)
          RUBY

      - name: Check whether libndi changed
        id: diff
        run: |
          set -euo pipefail

          if git diff --quiet -- Casks/libndi.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-libndi-${{ steps.metadata.outputs.version }}
          commit-message: Update libndi to ${{ steps.metadata.outputs.version }}
          title: Update libndi to ${{ steps.metadata.outputs.version }}
          body: |
            Updates the libNDI cask to the latest upstream version detected from:
            - https://downloads.ndi.tv/Tools/ndi_tools_win_current_version.json

            The workflow also refreshes the SHA-256 for the macOS pkg:
            - https://downloads.ndi.tv/SDK/NDI_SDK_Mac/libNDI_for_Mac.pkg
          delete-branch: true